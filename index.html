<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDE QUESTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background-color: #050505; color: #00ff41; font-family: 'VT323', monospace; text-transform: uppercase; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        input { background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 5px; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 crt h-screen flex flex-col justify-center items-center">
    
    <div id="login-screen" class="max-w-md border-2 border-[#00ff41] p-8 bg-black z-10 hidden text-center">
        <h2 class="text-2xl mb-4">IDENTIFICAZIONE UTENTE</h2>
        <p class="mb-4 text-sm opacity-70">INSERIRE TOKEN DI ACCESSO HUGGING FACE PER COLLEGARSI ALL'IA</p>
        <input type="password" id="api-key-input" placeholder="hf_xxxxxxxxxxxx" class="w-full mb-4 text-center">
        <button onclick="saveKey()" class="bg-[#00ff41] text-black px-4 py-2 hover:bg-white transition">INIZIALIZZA</button>
    </div>

    <div id="main-screen" class="max-w-2xl border-2 border-[#00ff41] p-8 relative z-10 bg-black shadow-[0_0_15px_rgba(0,255,65,0.5)] hidden">
        <header class="mb-6 border-b-2 border-[#00ff41] pb-2 flex justify-between">
            <h1 class="text-3xl">SIDE QUEST LOG</h1>
            <button onclick="logout()" class="text-[10px] border border-[#00ff41] px-1">DISCONNETTI</button>
        </header>

        <section>
            <h2 class="text-xl mb-2 text-white">[ MISSIONE DEL GIORNO ]</h2>
            <p id="main-quest" class="text-2xl mb-6 italic text-[#00ff41]">GENERAZIONE IN CORSO...</p>

            <h2 class="text-xl mb-2 text-white">[ OBIETTIVI SECONDARI ]</h2>
            <ul id="side-quests" class="list-none space-y-2 opacity-80 text-lg">
                <li>- SINCRONIZZAZIONE...</li>
            </ul>
        </section>
    </div>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');

        // Controlla se esiste già una chiave
        window.onload = () => {
            const savedKey = localStorage.getItem('hf_key');
            if (savedKey) {
                showMain(savedKey);
            } else {
                loginScreen.classList.remove('hidden');
            }
        };

        function saveKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key.startsWith('hf_')) {
                localStorage.setItem('hf_key', key);
                location.reload();
            } else {
                alert("TOKEN NON VALIDO. DEVE INIZIARE CON 'hf_'.");
            }
        }

        function logout() {
            localStorage.removeItem('hf_key');
            location.reload();
        }

        async function showMain(apiKey) {
            loginScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            
            // Usiamo la data di oggi come seed per il "random" così la missione è uguale per tutti
            const seed = new Date().toDateString();
            
            const prompt = `Agisci come Freakbait. Genera una missione 'Urban Side Quest'. Deve essere caotica, surreale, legale e sicura.
            Esempi: "Quando te ne stai per andare da casa di un amico inizia a salutare ma poi continua ad aggiungere commenti così che il saluto diventi sempre più lungo, finché devi trasferirti là",
            "Chiama un amico e appena risponde dici "Scusami sono un po' occupato ora, ti richiamo più tardi" e chiudi il telefono",
            "Avvicinati ad uno sconosciuto ed esclama "SEI TU! TI HO CERCATO OVUNQUE OGGI" e poi allontanati immediatamente"
            Rispondi SOLO con un JSON: {"main": "missione principale (max 12 parole)", "side": ["sub-quest 1", "sub-quest 2"]}. 
            Seed temporale: ${seed}. Lingua: Italiano.`;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: prompt })
                });
                
                const data = await response.json();
                const text = data[0].generated_text;
                const jsonStr = text.substring(text.lastIndexOf("{"), text.lastIndexOf("}") + 1);
                const quest = JSON.parse(jsonStr);

                document.getElementById('main-quest').innerText = quest.main;
                document.getElementById('side-quests').innerHTML = quest.side.map(s => `<li>- ${s}</li>`).join('');
            } catch (e) {
                document.getElementById('main-quest').innerText = "ERRORE DI CONNESSIONE. CHIAVE SCADUTA O MODELLO OFFLINE.";
            }
        }
    </script>
</body>
</html>
